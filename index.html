<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moving Road</title>
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
    <div id="game-container">
        <div id="score-board">
            <div id="score">Score: 0</div>
            <div id="high-score">Best: 0</div>
        </div>
        <div id="game-over">
            <h2>Game Over</h2>
            <p id="final-score">Score: 0</p>
            <p id="final-high-score" style="color:#FFEB3B; margin-top:6px;">Best: 0</p>
            <button id="restart-btn">Restart</button>
        </div>
        <div id="controls">
            <div class="control-row">
                <div class="control-btn" id="up-btn">&#8593;</div>
            </div>
            <div class="control-row">
                <div class="control-btn" id="left-btn">&#8592;</div>
                <div class="control-btn" id="down-btn">&#8595;</div>
                <div class="control-btn" id="right-btn">&#8594;</div>
            </div>
        </div>
    </div>

    <script src="src/js/scoring.js"></script>
    <script src="src/js/utils.js"></script>
    <script src="src/js/renderers/canvas2d.js"></script>
    <script src="src/js/renderers/imagedata.js"></script>
    <script src="src/js/renderers/webgl1.js"></script>
    <script src="src/js/renderers/webgl2.js"></script>
    <script src="src/js/renderers/webgpu.js"></script>
    <script src="src/js/renderers/offscreen-worker.js"></script>
    <script src="src/js/renderers/offscreen.js"></script>
    <script src="src/js/viewport.js"></script>
    <script src="src/js/renderer.js"></script>
    <script src="src/js/character.js"></script>
    <script src="src/js/game.js"></script>
    <script src="src/js/main.js"></script>
</body>
</html>
